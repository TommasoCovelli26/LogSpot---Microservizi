management.endpoints.web.exposure.include=gateway,health
server.port=8080
spring.application.name=gateway-service

# Configurazione Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.preferIpAddress=true

# Configurazione CORS (Per Next.js)
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*

# Rotte del Gateway
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://SERVICE-USER
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/utenti/**, /api/auth/**

spring.cloud.gateway.routes[1].id=catalog-service
spring.cloud.gateway.routes[1].uri=lb://SERVICE-CATALOGO
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/catalogo/**

spring.cloud.gateway.routes[2].id=therapy-service
spring.cloud.gateway.routes[2].uri=lb://SERVICE-TERAPIA
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/terapia/**

