management.endpoints.web.exposure.include=gateway,health
server.port=8080
spring.application.name=gateway-service

# Configurazione Eureka
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.preferIpAddress=true

# Configurazione CORS (Per Next.js)
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*

# ==========================================
# NUOVA CONFIGURAZIONE ROTTE DEL GATEWAY
# ==========================================

# 1. USER SERVICE - Gestione Autenticazione (/api/auth/** -> /auth/**)
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=lb://SERVICE-USER
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/auth/(?<segment>.*), /auth/${segment}

# 2. USER SERVICE - Gestione Utenti e Preferiti (/api/utenti/** -> /users/**)
spring.cloud.gateway.routes[1].id=user-service-utenti
spring.cloud.gateway.routes[1].uri=lb://SERVICE-USER
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/utenti/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/utenti/(?<segment>.*), /users/${segment}

# 3. CATALOG SERVICE - Catalogo Attività (/api/catalogo/** -> /catalog/**)
spring.cloud.gateway.routes[2].id=catalog-service
spring.cloud.gateway.routes[2].uri=lb://SERVICE-CATALOGO
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/catalogo/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/catalogo/(?<segment>.*), /catalog/${segment}

# 4. THERAPY SERVICE - Terapia ed Esercizi (I path coincidono, non serve Rewrite)
spring.cloud.gateway.routes[3].id=therapy-service
spring.cloud.gateway.routes[3].uri=lb://SERVICE-TERAPIA
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/terapia/**