name: Deploy Catalog Service to ACA

on:
  push:
    branches: [main]
    paths:
      - 'catalog-service/**'
  workflow_dispatch:

env:
  REGISTRY_NAME: logspotregistry
  IMAGE_NAME: logspotregistry.azurecr.io/catalog-service
  CONTAINER_APP_NAME: catalog-service
  RESOURCE_GROUP: logspot-rg

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Login ad Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build e Push dell'immagine Docker
        run: |
          cd catalog-service
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Login ad Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy su Azure Container Apps (via CLI diretta)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp registry set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server ${{ env.REGISTRY_NAME }}.azurecr.io \
              --username ${{ secrets.ACR_USERNAME }} \
              --password ${{ secrets.ACR_PASSWORD }}

            az containerapp secret set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets \
                mongo-uri="${{ secrets.MONGODB_URI }}"

            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --set-env-vars \
                EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=https://eureka-server.internal.agreeabledune-85eaf0e5.francecentral.azurecontainerapps.io/eureka/ \
                SPRING_DATA_MONGODB_URI=secretref:mongo-uri