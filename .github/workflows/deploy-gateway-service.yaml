name: Deploy Gateway Service to ACA

on:
  push:
    branches:
      - main
    paths:
      - 'gateway-service/**'
  workflow_dispatch:

env:
  REGISTRY_NAME: logspotregistry
  IMAGE_NAME: logspotregistry.azurecr.io/gateway-service
  CONTAINER_APP_NAME: gateway-service
  RESOURCE_GROUP: logspot-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Login ad Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build e Push dell'immagine Docker
        run: |
          cd gateway-service
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Login ad Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy su Azure Container Apps (Rilascio sicuro)
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ env.IMAGE_NAME }}:${{ github.sha }}